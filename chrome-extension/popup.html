<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 320px;
        min-height: 180px;
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        padding: 16px;
      }
      h1 {
        font-size: 15px;
        color: #4bc0c8;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #666;
      }
      .dot.on {
        background: #4bc0c8;
        animation: pulse 1.5s infinite;
      }
      .dot.ok {
        background: #06d6a0;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .card {
        background: #16213e;
        border: 1px solid #2a2a4a;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
      }
      .label {
        font-size: 11px;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 6px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .title {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-right: 8px;
        font-size: 13px;
      }
      .time {
        font-family: monospace;
        color: #4bc0c8;
      }
      .big {
        font-size: 22px;
        text-align: center;
        padding: 4px;
      }
      .empty {
        color: #666;
        font-size: 13px;
        text-align: center;
        padding: 6px;
      }
      .email {
        font-size: 12px;
        color: #aaa;
      }
      .btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
      }
      .btn:hover {
        opacity: 0.85;
      }
      .btn-main {
        background: #4bc0c8;
        color: #1a1a2e;
      }
      .btn-out {
        background: transparent;
        color: #e57cd8;
        border: 1px solid #e57cd8;
        padding: 6px 12px;
        font-size: 12px;
        width: auto;
      }
      .warn {
        background: #3e1a1a;
        border-color: #6e2a2a;
        color: #ff8888;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1><span class="dot" id="dot"></span> Lang Tracker YouTube</h1>

    <!-- OAuth未設定 -->
    <div id="setupView" style="display: none">
      <div class="card warn">
        <p>OAuth Client ID が未設定です。</p>
        <p style="margin-top: 6px">
          config.js の
          <code>GOOGLE_WEB_CLIENT_ID</code> を設定してください。詳細は README.md
          を参照。
        </p>
      </div>
    </div>

    <!-- 未ログイン -->
    <div id="loginView" style="display: none">
      <div class="card">
        <p style="margin-bottom: 10px; font-size: 13px">
          Googleアカウントでサインインすると、YouTube視聴時間が自動記録されます。
        </p>
        <button class="btn btn-main" id="signInBtn">Sign in with Google</button>
      </div>
    </div>

    <!-- メイン -->
    <div id="mainView" style="display: none">
      <div class="card">
        <div class="row">
          <span class="email" id="email"></span>
          <button class="btn btn-out" id="signOutBtn">Sign Out</button>
        </div>
      </div>
      <div class="card">
        <div class="label">Watching Now</div>
        <div id="sessions"><div class="empty">No videos playing</div></div>
      </div>
      <div class="card">
        <div class="label">Today's YouTube</div>
        <div class="time big" id="today">0:00:00</div>
      </div>
    </div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
